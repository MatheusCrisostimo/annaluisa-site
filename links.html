<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />

  <meta property="og:title" content="Anna Luísa — Atendimento Premium" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            premium: {
              gold: '#dfc1a4',   
              dark: '#171717',   
              light: '#fcfbfa'   
            }
          }
        }
      }
    }
  </script>

  <style>
    body { background-color: #fcfbfa; color: #171717; }
    .card { box-shadow: 0 10px 40px rgba(0,0,0,.04); border: 1px solid rgba(23,23,23,0.05); }
    
    /* Botões atualizados para a estética Luxo/Sóbria */
    .btn { display:flex; align-items:center; justify-content:center; gap:.6rem;
           padding:.9rem 1.1rem; border-radius:9999px; font-weight:600; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.05em; transition: 0.2s ease; }
    .btn-primary { color:#fff; background-color:#171717; }
    .btn-primary:hover { background-color:#333333; }
    .btn-outline { border:1px solid #171717; color:#171717; background: transparent; }
    .btn-outline:hover { background:#171717; color:#fff; }
    .btn-neutral { background:#fff; border:1px solid #e5e7eb; color: #171717; }
    .btn-neutral:hover { background:#f9fafb; }
    
    /* Avatar com borda dourada/nude sutil */
    .avatar { width:96px; height:96px; border-radius:9999px; object-fit:cover; border: 2px solid #dfc1a4; padding: 2px; }
  </style>

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-60ZPREPJV3"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('consent','default',{ad_user_data:'denied',ad_personalization:'denied',ad_storage:'denied',analytics_storage:'granted'});
    gtag('js', new Date()); gtag('config','G-60ZPREPJV3');
  </script>

  <script>
    (function(){
      const PHONE='5521995440439';
      // Copy atualizada para manter o tom de alto padrão
      function openWA(source='links', text='Olá Anna Luísa, vim do Instagram e gostaria de solicitar um orçamento personalizado.') {
        const t = encodeURIComponent(text);
        const url = `https://wa.me/${PHONE}?text=${t}&utm_source=instagram&utm_medium=bio&utm_campaign=links&src=${encodeURIComponent(source)}`;
        window.open(url,'_blank','noopener,noreferrer');
      }
      function bind() {
        document.querySelectorAll('[data-whats]').forEach(el=>{
          if(el.__wa) return; el.__wa = true;
          el.addEventListener('click', ()=>openWA(el.dataset.source||'links', el.dataset.text));
        });
      }
      bind(); document.addEventListener('DOMContentLoaded', bind);
      window.__openWA = openWA;
    })();
  </script>
</head>
<body class="bg-premium-light text-premium-dark antialiased">
  <main class="max-w-lg mx-auto px-4 py-12">
    <section class="bg-white rounded-2xl p-8 card text-center">
      
      <img src="images/WhatsApp%20Image%202025-08-24%20at%2015.03.20.jpeg" alt="Logo Anna Luísa" class="avatar mx-auto" onerror="this.src='images/logo.png'" />
      
      <h1 class="mt-5 text-xl font-light tracking-tight text-neutral-900">Anna Luísa — Maquiadora</h1>
      <p class="mt-1 text-xs text-neutral-500 uppercase tracking-widest font-medium">Palhoça / Florianópolis — SC</p>

      <div class="mt-8 grid gap-4">
        <button class="btn btn-primary" type="button" data-whats data-source="links_whats_top">
          💬 Falar no WhatsApp
        </button>

        <a href="index.html" class="btn btn-neutral">✨ Visitar Site Oficial</a>

        <a href="agendar.html" class="btn btn-outline">🗓️ Agendamento Rápido</a>
        <a href="https://www.instagram.com/annalluisaa/" target="_blank" rel="noopener" class="btn btn-outline">📸 Acompanhar no Instagram</a>
        
        <a href="https://www.google.com/maps/place/Anna+Luisa+Makeup+Artist/@-27.628773,-48.6727469,17z" target="_blank" rel="noopener" class="btn btn-outline" id="btnReviews">⭐ Avaliações no Google</a>
        
        <a href="docs/midia-kit.pdf" target="_blank" rel="noopener" class="btn btn-outline border-transparent text-neutral-500 hover:text-neutral-900 hover:bg-transparent underline decoration-1 underline-offset-4">Mídia Kit Corporativo</a>
      </div>

      <p class="mt-8 text-[10px] text-neutral-400 uppercase tracking-widest">© <span id="ano"></span> Anna Luísa</p>
    </section>
  </main>

  <script type="module">
    import { trackWhatsAppClick, trackReviews } from './scripts/analytics.js';
    document.getElementById('ano').textContent = new Date().getFullYear();

    // métricas (não bloqueiam os cliques)
    document.querySelectorAll('[data-whats]').forEach(el=>{
      el.addEventListener('click', ()=>trackWhatsAppClick(el.dataset.source||'links'));
    });
    document.getElementById('btnReviews')?.addEventListener('click', trackReviews);
  </script>
</body>
</html>
